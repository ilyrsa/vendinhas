spring.application.name=vendas-api

# Conexão com o banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/vendas_db
spring.datasource.username=postgres
spring.datasource.password=admin

# Hibernate (Spring Data JPA) - Atualização automática de tabelas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar a segurança do Spring temporariamente
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration